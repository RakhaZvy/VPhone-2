<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V-Phone Register</title>
    <link rel="icon" href="phoneLogo.png">
    <link rel="stylesheet" href="styleReg.css" />
  </head>
  <body>

    <div id="Forming">
      <div id="logo">
        <div id="logoContent">
          <img src="phoneLogo.png" alt="depan" id="logoPhone">
          <h2 id="textLogo">V-Phone Official Store</h2>

        </div>
        
        
      </div>

      
      <div id="forForm">
        <div>
          <h1>Register</h1>
        </div>
        <form id="registrationForm" href="home.html" method="get">
          <div>
            
            <label for="username">Username:</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Username"
            />
  
            <span id="error-username" class="error"></span>
          </div>
  
          <div>
            <label for="gender">Gender:</label>
            <select id="selecting" name="gender">
              <option value="">-- Choose Gender--</option>
              <option value="boy" id="boy">Male</option>
              <option value="girl" id="">Female</option>
              <option value="others" id="others">Others</option>
            </select>
            <span id="error-gender" class="error"></span>
          </div>
  
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email" />
            <span id="error-email" class="error"></span>
          </div>
  
          <div>
            <label for="password">Password:</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
            />
            <span id="error-password" class="error"></span>
          </div>
  
          <div>
            <label for="passwordConfirm">Password Confirmation:</label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              placeholder="Password Confirmation"
            />
            <span id="error-passwordValidate" class="error"></span>
          </div>
  
          <div id="submit">
              <button type="submit" id="btn-submit">Register Now</button>
            
          </div>
        </form>
      </div>
        
    </div>
    <script src="scriptValid.js" defer></script>
  </body>
</html>
